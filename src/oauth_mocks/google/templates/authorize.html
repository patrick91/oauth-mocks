<!DOCTYPE html>
<html lang="en">
<head>
    <title>Google OAuth Mock - Sign In</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #ffffff;
            color: #202124;
        }
        .container {
            width: 440px;
            padding: 48px 40px 36px;
            border: 1px solid #dadce0;
            border-radius: 8px;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-bottom: 20px;
            color: #ffffff;
            background: #4285f4;
            font-size: 24px;
            font-weight: 600;
        }
        h1 {
            font-size: 24px;
            font-weight: 400;
            margin: 0 0 10px;
        }
        .subtitle {
            color: #3c4043;
            font-size: 16px;
            margin: 0 0 32px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #3c4043;
        }
        input[type="email"] {
            width: 100%;
            padding: 13px 15px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            color: #202124;
            font-size: 16px;
            margin-bottom: 28px;
        }
        input[type="email"]:focus {
            outline: none;
            border-color: #1a73e8;
            box-shadow: inset 0 0 0 1px #1a73e8;
        }
        .actions {
            display: flex;
            justify-content: flex-end;
        }
        button {
            padding: 10px 24px;
            border: 0;
            border-radius: 4px;
            background: #1a73e8;
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        button:hover {
            background: #1765cc;
        }
        .hint {
            margin-top: 28px;
            padding: 14px 16px;
            background: #f8fafd;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 13px;
            color: #5f6368;
            line-height: 1.5;
        }
        code {
            color: #202124;
            background: #eef3fd;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">G</div>
        <h1>Sign in</h1>
        <p class="subtitle">Continue with Google OAuth Mock.</p>

        <form method="POST">
            <input type="hidden" name="client_id" value="{{client_id}}">
            <input type="hidden" name="redirect_uri" value="{{redirect_uri}}">
            <input type="hidden" name="scope" value="{{scope}}">
            <input type="hidden" name="state" value="{{state}}">
            <input type="hidden" name="code_challenge" value="{{code_challenge}}">
            <input type="hidden" name="code_challenge_method" value="{{code_challenge_method}}">
            <input type="hidden" name="nonce" value="{{nonce}}">

            <label for="email">Email address</label>
            <input
                type="email"
                id="email"
                name="email"
                placeholder="you@example.com"
                value="{{login_hint}}"
                required
                autofocus
            >

            <div class="actions">
                <button type="submit">Sign in</button>
            </div>
        </form>

        <div class="hint">
            <strong>Testing tip:</strong> Use <code>unverified@...</code> to simulate
            an unverified Google email address.
        </div>
    </div>
</body>
</html>
